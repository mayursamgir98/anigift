name: Claude AI Anigift PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-pr-review:
    # Run only on standard PR events OR when someone mentions @claude in a PR comment
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full git history so Claude can see the code diff

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Application Dependencies
        run: npm ci

      - name: Execute Claude PR Review Action
        uses: anthropics/claude-code-action@v1
        with:
          # Automatically uses your .claude/skills/ecom-review/SKILL.md parameters
          prompt: "review ecom code and post code improvements as a PR comment review"
          claude_args: "--max-turns 4" # Prevents runaway tokens on large diff pipelines
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
