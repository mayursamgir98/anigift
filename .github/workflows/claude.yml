name: CI/CD Pipeline Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: animeverse-login

    steps:
      - name: Checkout Repository code
        uses: actions/checkout@v4

      - name: Set up Node.js Environments
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: animeverse-login/package-lock.json

      - name: Install Project Dependencies
        run: npm install

      - name: Run Quality Checks & Linters
        run: |
          echo "Validating code formatting and syntax checks..."
          npm run lint

      - name: Build Project
        run: npm run build
